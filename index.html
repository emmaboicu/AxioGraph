<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AxioGraph_4</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="app.js"></script>
</head>

<body>
  <div id="workspace" class="main-container">

    <!-- ZONA STÂNGĂ: hârtia milimetrică reală AxioGraph -->
    <div id="sheet-column" class="graph-area">
      <div id="a4-container">
        <svg id="graph" xmlns="http://www.w3.org/2000/svg" viewBox="-4 0 264 270" preserveAspectRatio="xMinYMin meet">
          <defs>
            <marker id="arrow-head" viewBox="0 0 6 6" refX="0" refY="3" markerWidth="4" markerHeight="4" orient="auto">
              <path d="M 0 0 L 6 3 L 0 6 z" fill="#00008B" />
            </marker>
          </defs>

          <g id="grid-lines"></g>
          <g id="axes"></g>
          <g id="tick-marks"></g>
          <g id="scale-step-marks"></g>

          <g id="trendline-layer-1"></g>
          <g id="trendline-layer-2"></g>
          <g id="trendline-layer-3"></g>
          <g id="curveline-layer"></g>

          <g id="experimental-points"></g>
          <g id="slope-points"></g>
          <g id="intersection-points"></g>

          <text id="axis-label-x" class="axis-label-svg" x="252" y="264" text-anchor="end"></text>
          <text id="axis-label-y" class="axis-label-svg" x="4" y="8" text-anchor="end" transform="rotate(-90 4 8)"></text>
        </svg>


        <div id="tick-container"></div>
      </div>
    </div>

    <!-- ZONA DREAPTĂ: panou mock-up cu id-uri funcționale -->
    <div id="controls-column" class="control-panel">
      <div id="controls">

        <!-- CARD 1: LabWork -->
        <div class="card card-1">
          <span class="text-labwork">LabWork</span>

          <button id="save-work" class="btn-save btn-labwork">Save</button>

          <button id="load-work-btn" class="btn-load btn-labwork">Load</button>
          <input type="file" id="load-work-input" accept=".axio,.json,application/json" style="display:none;">
        </div>
        
        <!-- CARD 2A: Axes Labels -->
<div class="card card-labels">
  <div class="row row-between">
    <span class="tool-title text-labels">Axes Labels</span>

    <input
      type="text"
      id="axis-label-input-x"
      class="input-label"
      placeholder="OX"
    >

    <input
      type="text"
      id="axis-label-input-y"
      class="input-label"
      placeholder="OY"
    >
  </div>
</div>

<!-- CARD 2B: Scales + Steps -->
<div class="card card-2">
  <div class="card-2-col">
    <div class="tool-title text-scale">Scales</div>

    <div class="row">
      <svg class="icon-square" viewBox="0 0 20 20" aria-hidden="true">
         <rect x="1" y="1" width="18" height="18" fill="#ffffff" stroke="#2f86ff" stroke-width="1.2"/>
         <path d="M5 1 V19 M9 1 V19 M13 1 V19 M17 1 V19
          M1 5 H19 M1 9 H19 M1 13 H19 M1 17 H19"
         stroke="#7fc4ff" stroke-width="0.7"/>
         <path d="M9 1 V19 M1 9 H19"
         stroke="#2f86ff" stroke-width="1"/>
          </svg>
      <input
        type="number"
        id="scale-input-x"
        class="input-label"
        step="any"
        placeholder="OX"
      >
    </div>

    <div class="row">
      <svg class="icon-square" viewBox="0 0 20 20" aria-hidden="true">
       <rect x="1" y="1" width="18" height="18" fill="#ffffff" stroke="#2f86ff" stroke-width="1.2"/>
         <path d="M5 1 V19 M9 1 V19 M13 1 V19 M17 1 V19
           M1 5 H19 M1 9 H19 M1 13 H19 M1 17 H19"
           stroke="#7fc4ff" stroke-width="0.7"/>
          <path d="M9 1 V19 M1 9 H19"
          stroke="#2f86ff" stroke-width="1"/>
           </svg>
      <input
        type="number"
        id="scale-input-y"
        class="input-label"
        step="any"
        placeholder="OY"
      >
    </div>
  </div>

  <div class="card-2-col">
    <div class="tool-title text-scale">Steps</div>

    <div class="row">
      <input
        type="number"
        id="step-input-x"
        class="input-label"
        step="any"
        placeholder="OX step"
      >
    </div>

    <div class="row">
      <input
        type="number"
        id="step-input-y"
        class="input-label"
        step="any"
        placeholder="OY step"
      >
    </div>
  </div>
</div>
        
        <!-- CARD 3: Data Point -->
<div class="card card-3">
  <div class="row row-between">
    <span class="tool-title text-datapoint">Data Point</span>

    <input type="number" id="point-input-x" class="input-xy" step="any" placeholder="x">
    <input type="number" id="point-input-y" class="input-xy" step="any" placeholder="y">

    <button id="add-point" class="btn-p-plus">+P</button>
    <button id="delete-full-point" class="btn-del-text">Del</button>
  </div>
</div>

<!-- CARD 4: Line + Extend Line -->
<div class="card card-4">
  <div class="row row-between margin-b">
    <span class="tool-title text-line">Straight Line</span>

    <div class="btn-group">
      <button id="activate-trendline-1" class="btn-start">Start</button>
      <button id="fix-trendline-1" class="btn-fix" disabled>Fix</button>
      <button id="reset-trendline-1" class="btn-del-text" disabled>Del</button>
    </div>
  </div>

  <div class="row row-between">
    <span class="tool-title text-extend">Extend Line</span>

    <div class="btn-group">
      <button id="activate-extensions" class="btn-start">Start</button>
      <button id="fix-extensions" class="btn-fix" disabled>Fix</button>
      <button id="reset-extensions" class="btn-del-text" disabled>Del</button>
    </div>
  </div>
</div>
        <!-- CARD 6: Intercepts -->
        <div class="card card-6">
          <div class="tool-title text-intercepts">Axis Intercepts</div>

          <div class="row row-between">
          <input
             type="number"
             id="intersection-x-value"
             class="input-xy"
             step="any"
             placeholder="x"
             >
        <button id="add-intersection-x" class="btn-siclam">+X</button>
        <button id="reset-intersection-x" class="btn-del-text">Del</button>

         <input
          type="number"
          id="intersection-y-value"
          class="input-xy"
          step="any"
          placeholder="y"
          >
    <button id="add-intersection-y" class="btn-siclam">+Y</button>
    <button id="reset-intersection-y" class="btn-del-text">Del</button>
  </div>
</div>

        <!-- CARD 5: Slope Points -->
        <div class="card card-5">
            <div class="tool-title text-slope">Slope Points</div>
            <div class="row row-between margin-b">
            <span class="tool-title text-slope">P₁</span>

            <input
              type="number"
              id="slope-p1-x"
              class="input-xy"
              step="any"
              placeholder="x"
            >

            <input
              type="number"
              id="slope-p1-y"
              class="input-xy"
              step="any"
              placeholder="y"
            >

            <button id="add-slope-p1" class="btn-orange">+P₁</button>
            <button id="reset-slope-p1" class="btn-del-text">Del</button>
          </div>

          <div class="row row-between">
            <span class="tool-title text-slope">P₂</span>

            <input
              type="number"
              id="slope-p2-x"
              class="input-xy"
              step="any"
              placeholder="x"
            >

            <input
              type="number"
              id="slope-p2-y"
              class="input-xy"
              step="any"
              placeholder="y"
            >

            <button id="add-slope-p2" class="btn-orange">+P₂</button>
            <button id="reset-slope-p2" class="btn-del-text">Del</button>
          </div>
        </div>

   <!-- CARD 7: CurveLine -->
<div class="card card-7">
  <div class="row row-between">
    <span class="tool-title text-curveline">Curve Line</span>

    <div class="btn-group">
      <button id="activate-curveline" class="btn-curve">Start</button>
      <button id="fix-curveline" class="btn-curve-fix" disabled>Fix</button>
      <button id="reset-curveline" class="btn-del-text" disabled>Del</button>
    </div>
  </div>
</div>


        <!-- CARD 9: Clear -->
        <button id="clear-labwork" class="btn-clear-labwork">CLEAR LabWork</button>

      </div>
    </div>

  </div>
</body>
</html>
